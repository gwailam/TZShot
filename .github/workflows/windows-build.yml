name: Windows Build

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Qt 6.8.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Configure (Release)
        shell: pwsh
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/app -Force | Out-Null
          Copy-Item build/TZshot.exe dist/app/TZshot.exe -Force
          windeployqt --release --no-translations --no-compiler-runtime --no-opengl-sw dist/app/TZshot.exe

      - name: Build Installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $ver = $ref -replace '^refs/tags/v', ''
            & "$iscc" "/DMyAppVersion=$ver" packaging\tzshot.iss
          } else {
            & "$iscc" packaging\tzshot.iss
          }
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem dist\*-setup.exe

      - name: Pack Zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/app/* -DestinationPath TZshot-windows-release.zip -CompressionLevel Optimal -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TZshot-windows-release
          path: |
            TZshot-windows-release.zip
            dist/*-setup.exe
          if-no-files-found: error

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TZshot-windows-release.zip
            dist/*-setup.exe
          generate_release_notes: true
